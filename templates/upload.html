{% extends "base.html" %}
{% block title %}Upload File Resi{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card upload-card">
            <div class="card-header text-center">
                <h4><i class="bi bi-cloud-upload"></i> Upload File Resi</h4>
                <p class="text-muted small">Upload file Excel dengan kolom <strong>RESI</strong></p>
            </div>
            <div class="card-body">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-content">
                            <i class="bi bi-file-earmark-excel display-1 text-success"></i>
                            <p class="mt-3">Seret & jatuhkan file di sini, atau klik untuk memilih</p>
                            <input class="form-control" type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
                            <button type="button" class="btn btn-outline-primary" onclick="document.getElementById('fileInput').click()">
                                <i class="bi bi-folder-open"></i> Pilih File
                            </button>
                        </div>
                        <div id="filePreview" style="display:none;" class="mt-3">
                            <div class="file-info">
                                <i class="bi bi-file-earmark-excel text-success fs-3"></i>
                                <div class="file-details">
                                    <strong id="fileName"></strong>
                                    <span class="text-muted" id="fileSize"></span>
                                </div>
                                <button type="button" class="btn btn-sm btn-danger" onclick="removeFile()">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3" id="submitBtn" disabled>
                        <i class="bi bi-upload"></i> Upload
                    </button>
                </form>
                <div id="uploadStatus" class="mt-3"></div>
                <div id="fileInfo" class="mt-3" style="display:none;">
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle"></i> <span id="successMessage"></span>
                    </div>
                    <button id="goDashboard" class="btn btn-success w-100">
                        <i class="bi bi-house"></i> Kembali ke Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let selectedFile = null;

// Drop zone
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
    }
});
dropZone.addEventListener('click', () => {
    fileInput.click();
});
fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) {
        handleFile(e.target.files[0]);
    }
});

function handleFile(file) {
    const validTypes = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 
                         'application/vnd.ms-excel'];
    if (!validTypes.includes(file.type) && !file.name.match(/\.(xlsx|xls)$/)) {
        alert('Format file tidak didukung. Gunakan .xlsx atau .xls');
        return;
    }
    selectedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = `(${(file.size / 1024).toFixed(1)} KB)`;
    document.getElementById('filePreview').style.display = 'block';
    document.getElementById('submitBtn').disabled = false;
    dropZone.querySelector('.drop-zone-content').style.display = 'none';
}

function removeFile() {
    selectedFile = null;
    document.getElementById('filePreview').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    fileInput.value = '';
    dropZone.querySelector('.drop-zone-content').style.display = 'block';
}

document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!selectedFile) return;
    
    const formData = new FormData();
    formData.append('file', selectedFile);
    
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerHTML = '<span class="spinner-border spinner-border-sm"></span> Uploading...';
    
    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById('uploadStatus').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-upload"></i> Upload';
        } else {
            document.getElementById('uploadStatus').innerHTML = '';
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('successMessage').textContent = data.message;
            sessionStorage.setItem('uploadedFile', data.filepath);
            sessionStorage.setItem('batchId', data.batch_id);
            document.getElementById('goDashboard').addEventListener('click', function() {
                window.location.href = '/';
            });
        }
    });
});
</script>
{% endblock %}
